apis:
  - aid: smartcar:vehicles-api
    name: Smartcar Vehicles API
    description: >-
      The Smartcar Vehicles API lets you access standardized vehicle data and
      send commands to connected vehicles. Retrieve signals such as battery
      level, odometer, location, fuel, engine oil, and diagnostic codes, as
      well as issue commands like lock/unlock doors, start/stop charging,
      set charge limit, and set navigation destinations across multiple vehicle
      brands. Uses OAuth 2.0 bearer token authentication.
