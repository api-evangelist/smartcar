aid: smartcar
name: Smartcar
description: >-
  Smartcar is a connected vehicle platform that provides a standardized REST
  API for accessing vehicle data and sending commands to connected cars. The
  API enables developers to retrieve battery levels, odometer readings,
  location, lock/unlock doors, start/stop charging and access vehicle
  attributes across multiple vehicle brands through a single integration.
