naftiko: "1.0.0-alpha1"

info:
  label: Smartcar Vehicles API
  description: >-
    Smartcar Vehicles API provides standardized REST access to connected vehicle
    data and commands across multiple OEM vehicle brands. Read telemetry signals
    and issue commands via a single integration.
  tags:
    - Smartcar
    - Connected Vehicles
    - Automotive
    - IoT
    - Telematics
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SMARTCAR_ACCESS_TOKEN: SMARTCAR_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: smartcar
      baseUri: https://vehicle.api.smartcar.com/v2.0
      description: Smartcar Vehicle API for connected vehicle data and commands
      authentication:
        type: bearer
        token: "{{SMARTCAR_ACCESS_TOKEN}}"
      resources:
        - name: connections
          path: /connections
          description: Manage vehicle connections
          operations:
            - name: list-connections
              method: GET
              description: List all vehicle connections for the authorized user
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-connection
              method: GET
              description: Get a specific vehicle connection
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: Connection ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: remove-connection
              method: DELETE
              description: Remove a vehicle connection
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: vehicle
          path: /vehicles/{id}
          description: Access vehicle data and attributes
          operations:
            - name: get-vehicle
              method: GET
              description: Get vehicle attributes and metadata
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: Vehicle ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-signals
              method: GET
              description: Read all available telemetry signals for the vehicle
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: battery
          path: /vehicles/{id}/battery
          description: EV battery status
          operations:
            - name: get-battery-level
              method: GET
              description: Get battery charge level and estimated range
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: charge
          path: /vehicles/{id}/charge
          description: EV charging management
          operations:
            - name: get-charge-status
              method: GET
              description: Get current charging state and plug-in status
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: control-charge
              method: POST
              description: Start or stop vehicle charging
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  action: "{{tools.action}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: charge-limit
          path: /vehicles/{id}/charge/limit
          description: EV charge limit management
          operations:
            - name: get-charge-limit
              method: GET
              description: Get the current charge limit setting
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: set-charge-limit
              method: POST
              description: Set the maximum battery charge level
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  limit: "{{tools.limit}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: security
          path: /vehicles/{id}/security
          description: Vehicle lock/unlock controls
          operations:
            - name: get-lock-status
              method: GET
              description: Get current lock status of doors and windows
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: control-security
              method: POST
              description: Lock or unlock vehicle doors
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  action: "{{tools.action}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: location
          path: /vehicles/{id}/location
          description: Vehicle location
          operations:
            - name: get-location
              method: GET
              description: Get current GPS coordinates of the vehicle
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: odometer
          path: /vehicles/{id}/odometer
          description: Vehicle odometer reading
          operations:
            - name: get-odometer
              method: GET
              description: Get the vehicle's current odometer reading
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: fuel
          path: /vehicles/{id}/fuel
          description: Vehicle fuel status
          operations:
            - name: get-fuel-tank
              method: GET
              description: Get fuel tank level, amount, and estimated range
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: engine-oil
          path: /vehicles/{id}/engine/oil
          description: Engine oil life
          operations:
            - name: get-engine-oil
              method: GET
              description: Get remaining engine oil life percentage
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: diagnostics
          path: /vehicles/{id}/diagnostics/dtcs
          description: Vehicle diagnostic trouble codes
          operations:
            - name: get-diagnostic-codes
              method: GET
              description: Get active OBD-II diagnostic trouble codes
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: navigation
          path: /vehicles/{id}/commands/set-destination
          description: Vehicle navigation
          operations:
            - name: set-destination
              method: POST
              description: Set a navigation destination in the vehicle
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  latitude: "{{tools.latitude}}"
                  longitude: "{{tools.longitude}}"
                  address: "{{tools.address}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: smartcar-rest
      resources:
        - path: /v1/vehicles/{id}
          name: vehicle
          operations:
            - method: GET
              name: get-vehicle
              description: Get vehicle attributes
              call: "smartcar.get-vehicle"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/vehicles/{id}/battery
          name: battery
          operations:
            - method: GET
              name: get-battery-level
              description: Get battery level
              call: "smartcar.get-battery-level"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: smartcar-mcp
      transport: http
      tools:
        - name: get-vehicle
          description: Get attributes and metadata for a connected vehicle
          hints:
            readOnly: true
            openWorld: false
          call: "smartcar.get-vehicle"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-battery-level
          description: Get current battery charge level and estimated range for an EV
          hints:
            readOnly: true
            openWorld: false
          call: "smartcar.get-battery-level"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-charge-status
          description: Get current EV charging status and plug-in state
          hints:
            readOnly: true
            openWorld: false
          call: "smartcar.get-charge-status"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-lock-status
          description: Get current lock/unlock status of vehicle doors and windows
          hints:
            readOnly: true
            openWorld: false
          call: "smartcar.get-lock-status"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-location
          description: Get current GPS location of the vehicle
          hints:
            readOnly: true
            openWorld: false
          call: "smartcar.get-location"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-odometer
          description: Get the vehicle odometer reading in kilometers
          hints:
            readOnly: true
            openWorld: false
          call: "smartcar.get-odometer"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-fuel-tank
          description: Get fuel tank level, remaining amount, and estimated range
          hints:
            readOnly: true
            openWorld: false
          call: "smartcar.get-fuel-tank"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-engine-oil
          description: Get remaining engine oil life percentage
          hints:
            readOnly: true
            openWorld: false
          call: "smartcar.get-engine-oil"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-diagnostic-codes
          description: Get active OBD-II diagnostic trouble codes from the vehicle
          hints:
            readOnly: true
            openWorld: false
          call: "smartcar.get-diagnostic-codes"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: control-charge
          description: Start or stop EV charging
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "smartcar.control-charge"
          with:
            id: "tools.id"
            action: "tools.action"
          outputParameters:
            - type: object
              mapping: "$."
        - name: set-charge-limit
          description: Set the maximum battery charge limit for an EV
          hints:
            readOnly: false
            idempotent: true
          call: "smartcar.set-charge-limit"
          with:
            id: "tools.id"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: control-security
          description: Lock or unlock vehicle doors remotely
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "smartcar.control-security"
          with:
            id: "tools.id"
            action: "tools.action"
          outputParameters:
            - type: object
              mapping: "$."
        - name: set-destination
          description: Set a navigation destination in the vehicle
          hints:
            readOnly: false
            idempotent: false
          call: "smartcar.set-destination"
          with:
            id: "tools.id"
            latitude: "tools.latitude"
            longitude: "tools.longitude"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-connections
          description: List all vehicle connections for the authorized user
          hints:
            readOnly: true
            openWorld: false
          call: "smartcar.list-connections"
          outputParameters:
            - type: object
              mapping: "$."
