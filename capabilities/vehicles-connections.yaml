naftiko: 1.0.0-alpha2
info:
  label: Smartcar Vehicles API — Connections
  description: 'Smartcar Vehicles API — Connections. 4 operations. Lead operation: List Connections. Self-contained Naftiko
    capability covering one Smartcar business surface.'
  tags:
  - Smartcar
  - Connections
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SMARTCAR_API_KEY: SMARTCAR_API_KEY
capability:
  consumes:
  - type: http
    namespace: vehicles-connections
    baseUri: https://vehicle.api.smartcar.com/v2.0
    description: Smartcar Vehicles API — Connections business capability. Self-contained, no shared references.
    resources:
    - name: connections
      path: /connections
      operations:
      - name: listconnections
        method: GET
        description: List Connections
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: connections-id
      path: /connections/{id}
      operations:
      - name: getconnection
        method: GET
        description: Get Connection
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Connection ID
          required: true
      - name: removeconnection
        method: DELETE
        description: Remove Connection
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Connection ID
          required: true
    - name: users-id
      path: /users/{id}
      operations:
      - name: removeuser
        method: DELETE
        description: Remove User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: User ID
          required: true
    authentication:
      type: bearer
      token: '{{env.SMARTCAR_API_KEY}}'
  exposes:
  - type: rest
    namespace: vehicles-connections-rest
    port: 8080
    description: REST adapter for Smartcar Vehicles API — Connections. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/connections
      name: connections
      description: REST surface for connections.
      operations:
      - method: GET
        name: listconnections
        description: List Connections
        call: vehicles-connections.listconnections
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/connections/{id}
      name: connections-id
      description: REST surface for connections-id.
      operations:
      - method: GET
        name: getconnection
        description: Get Connection
        call: vehicles-connections.getconnection
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: removeconnection
        description: Remove Connection
        call: vehicles-connections.removeconnection
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{id}
      name: users-id
      description: REST surface for users-id.
      operations:
      - method: DELETE
        name: removeuser
        description: Remove User
        call: vehicles-connections.removeuser
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: vehicles-connections-mcp
    port: 9090
    transport: http
    description: MCP adapter for Smartcar Vehicles API — Connections. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-connections
      description: List Connections
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vehicles-connections.listconnections
      outputParameters:
      - type: object
        mapping: $.
    - name: get-connection
      description: Get Connection
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vehicles-connections.getconnection
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: remove-connection
      description: Remove Connection
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: vehicles-connections.removeconnection
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: remove-user
      description: Remove User
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: vehicles-connections.removeuser
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
