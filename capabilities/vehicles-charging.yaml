naftiko: 1.0.0-alpha2
info:
  label: Smartcar Vehicles API — Charging
  description: 'Smartcar Vehicles API — Charging. 4 operations. Lead operation: Get Charge Status. Self-contained Naftiko
    capability covering one Smartcar business surface.'
  tags:
  - Smartcar
  - Charging
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SMARTCAR_API_KEY: SMARTCAR_API_KEY
capability:
  consumes:
  - type: http
    namespace: vehicles-charging
    baseUri: https://vehicle.api.smartcar.com/v2.0
    description: Smartcar Vehicles API — Charging business capability. Self-contained, no shared references.
    resources:
    - name: vehicles-id-charge
      path: /vehicles/{id}/charge
      operations:
      - name: getchargestatus
        method: GET
        description: Get Charge Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
      - name: controlcharge
        method: POST
        description: Start Or Stop Charging
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: vehicles-id-charge-limit
      path: /vehicles/{id}/charge/limit
      operations:
      - name: getchargelimit
        method: GET
        description: Get Charge Limit
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
      - name: setchargelimit
        method: POST
        description: Set Charge Limit
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SMARTCAR_API_KEY}}'
  exposes:
  - type: rest
    namespace: vehicles-charging-rest
    port: 8080
    description: REST adapter for Smartcar Vehicles API — Charging. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/vehicles/{id}/charge
      name: vehicles-id-charge
      description: REST surface for vehicles-id-charge.
      operations:
      - method: GET
        name: getchargestatus
        description: Get Charge Status
        call: vehicles-charging.getchargestatus
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: controlcharge
        description: Start Or Stop Charging
        call: vehicles-charging.controlcharge
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/vehicles/{id}/charge/limit
      name: vehicles-id-charge-limit
      description: REST surface for vehicles-id-charge-limit.
      operations:
      - method: GET
        name: getchargelimit
        description: Get Charge Limit
        call: vehicles-charging.getchargelimit
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: setchargelimit
        description: Set Charge Limit
        call: vehicles-charging.setchargelimit
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: vehicles-charging-mcp
    port: 9090
    transport: http
    description: MCP adapter for Smartcar Vehicles API — Charging. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-charge-status
      description: Get Charge Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vehicles-charging.getchargestatus
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: start-stop-charging
      description: Start Or Stop Charging
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: vehicles-charging.controlcharge
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-charge-limit
      description: Get Charge Limit
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vehicles-charging.getchargelimit
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: set-charge-limit
      description: Set Charge Limit
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: vehicles-charging.setchargelimit
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
